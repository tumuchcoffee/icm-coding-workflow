# docker-compose.yml — v0.1.3
# ICM Admin Panel local development stack
# ADR-010: Docker Compose over Manual Container Orchestration
# ADR-015: Development vs. Production Build Modes via Compose Profiles

name: icm-local

services:
  # ── SQL Server 2022 Developer Edition ─────────────────────────
  icm-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: icm-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-SynergisticDev123!}
      MSSQL_PID: Developer
    ports:
      # DEV ONLY: exposed for SSMS / Azure Data Studio access from host.
      # Remove this mapping in CI/production to comply with NFR-003.
      - "1433:1433"
    volumes:
      - icm-sql-data:/var/opt/mssql/data
    networks:
      - icm-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD:-SynergisticDev123!}" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    user: root
    restart: unless-stopped
  icm-api:
    build:
      context: .
      dockerfile: source/02-backend/Dockerfile
      target: runtime
    container_name: icm-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__Default=Server=icm-db,1433;Database=Synergistic;User Id=sa;Password=${MSSQL_SA_PASSWORD:-SynergisticDev123!};TrustServerCertificate=True;
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-SynergisticDev123!}
    ports:
      - "5001:5001"
    networks:
      - icm-network
    depends_on:
      icm-db:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:5001/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── Angular 19 SPA ────────────────────────────────────────────
  icm-ui:
    build:
      context: .
      dockerfile: source/01-ui/Dockerfile
      target: runtime
    container_name: icm-ui
    ports:
      - "4200:80"
    networks:
      - icm-network
    depends_on:
      icm-api:
        condition: service_healthy
    healthcheck:
      test: wget -qO- http://localhost:80/ || exit 1
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Development profile services ──────────────────────────────
  # Started with: docker compose --profile dev up
  icm-api-dev:
    build:
      context: .
      dockerfile: source/02-backend/Dockerfile
      target: development
    container_name: icm-api-dev
    profiles: [dev]
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__Default=Server=icm-db,1433;Database=Synergistic;User Id=sa;Password=${MSSQL_SA_PASSWORD:-SynergisticDev123!};TrustServerCertificate=True;
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-SynergisticDev123!}
    ports:
      - "5001:5001"
    volumes:
      - ./source/02-backend/src:/app/src
      - /app/obj
      - /app/bin
    networks:
      - icm-network
    depends_on:
      icm-db:
        condition: service_healthy
    restart: unless-stopped

  icm-ui-dev:
    build:
      context: .
      dockerfile: source/01-ui/Dockerfile
      target: development
    container_name: icm-ui-dev
    profiles: [dev]
    ports:
      - "4200:4200"
    volumes:
      - ./source/01-ui/src:/app/src
      - /app/node_modules
    networks:
      - icm-network
    depends_on:
      - icm-api-dev
    restart: unless-stopped

networks:
  icm-network:
    driver: bridge
    name: icm-network

volumes:
  icm-sql-data:
    name: icm-sql-data
